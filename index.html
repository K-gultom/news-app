<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Berita</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #F1F5F9;
      color: #1E293B;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1E3A5F;
      color: white;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo span { opacity: 0.6; font-weight: 400; font-size: 13px; }
    .search-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 0 12px;
      gap: 8px;
    }
    .search-wrap input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 13px;
      width: 220px;
      padding: 8px 0;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.5); }
    .search-icon { opacity: 0.6; font-size: 14px; }

    /* ── Layout ── */
    .container {
      max-width: 900px;
      margin: 36px auto;
      padding: 0 20px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .count-badge {
      background: #2563EB;
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #0F172A;
    }
    .sort-select {
      border: 1px solid #CBD5E1;
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 13px;
      color: #475569;
      background: white;
      cursor: pointer;
      outline: none;
    }

    /* ── List ── */
    #news-list { display: flex; flex-direction: column; gap: 1px; }

    .news-card {
      background: white;
      border-radius: 0;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    #news-list .news-card:first-child { border-radius: 12px 12px 0 0; }
    #news-list .news-card:last-child  { border-radius: 0 0 12px 12px; }
    #news-list .news-card:only-child  { border-radius: 12px; }
    .news-card:hover {
      background: #F8FAFF;
      border-left-color: #2563EB;
    }

    .num {
      font-size: 13px;
      color: #CBD5E1;
      font-weight: 600;
      min-width: 28px;
      text-align: right;
      flex-shrink: 0;
    }
    .news-card:hover .num { color: #93C5FD; }

    .info { flex: 1; min-width: 0; }
    .judul {
      font-size: 15px;
      font-weight: 600;
      color: #0F172A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    .news-card:hover .judul { color: #2563EB; }

    .meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: #64748B;
      flex-wrap: wrap;
    }
    .meta-item { display: flex; align-items: center; gap: 5px; }
    .meta-icon { font-size: 11px; }

    .arrow {
      color: #CBD5E1;
      font-size: 14px;
      flex-shrink: 0;
      transition: transform 0.15s, color 0.15s;
    }
    .news-card:hover .arrow { color: #2563EB; transform: translateX(3px); }

    /* ── Divider ── */
    #news-list .news-card + .news-card {
      border-top: 1px solid #F1F5F9;
    }

    /* ── States ── */
    .state-box {
      background: white;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      color: #94A3B8;
    }
    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box p { font-size: 14px; }
    .state-box strong { color: #475569; font-size: 16px; display: block; margin-bottom: 6px; }

    /* ── Skeleton loader ── */
    .skeleton { background: white; border-radius: 12px; padding: 18px 22px; }
    .skel-line {
      background: #E2E8F0;
      border-radius: 4px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #94A3B8;
      margin: 40px 0 24px;
    }
    .footer a { color: #60A5FA; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    📰 Portal Berita <span>edisi lokal</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Cari judul atau penulis..."/>
  </div>
</header>

<div class="container">

  <div class="toolbar">
    <div class="toolbar-left">
      <span class="section-title">Daftar Berita</span>
      <span class="count-badge" id="count-badge">0</span>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="terbaru">Terbaru</option>
      <option value="terlama">Terlama</option>
      <option value="az">Judul A–Z</option>
      <option value="za">Judul Z–A</option>
    </select>
  </div>

  <div id="news-list">
    <!-- Skeleton -->
    <div class="skeleton" id="loading-skeleton">
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="skel-line" style="height:14px;width:65%"></div>
        <div class="skel-line" style="height:11px;width:40%"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    Ditenagai oleh <a href="#">News Editor</a> &mdash; semua file dari folder yang sama
  </div>
</div>

<script>
  // ──────────────────────────────────────────
  //  Ambil meta dari <head> file berita
  // ──────────────────────────────────────────
  async function fetchMeta(filename) {
    try {
      const res = await fetch(filename);
      if (!res.ok) return null;
      const html = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // Coba ambil dari <meta> tag dulu, lalu fallback ke elemen
      const getMeta = (name) => {
        const tag = doc.querySelector(`meta[name="${name}"]`);
        return tag ? tag.getAttribute('content') : null;
      };

      const judul   = getMeta('judul')   || doc.querySelector('h1')?.textContent?.trim()  || doc.title || filename;
      const author  = getMeta('author')  || doc.querySelector('[class*="author"] span')?.textContent?.trim()
                                         || doc.querySelector('.meta span:first-child')?.textContent?.replace(/^[✍\s]+/,'').trim()
                                         || '—';
      const tanggal = getMeta('tanggal') || doc.querySelector('.meta span:last-child')?.textContent?.replace(/^[📅\s]+/,'').trim()
                                         || '—';

      return { filename, judul, author, tanggal };
    } catch (e) {
      return null;
    }
  }

  // ──────────────────────────────────────────
  //  Parse tanggal Indonesia → Date object
  // ──────────────────────────────────────────
  function parseDate(str) {
    const bulan = {
      'januari':0,'februari':1,'maret':2,'april':3,'mei':4,'juni':5,
      'juli':6,'agustus':7,'september':8,'oktober':9,'november':10,'desember':11
    };
    if (!str || str === '—') return new Date(0);
    const parts = str.toLowerCase().split(' ');
    if (parts.length === 3) {
      return new Date(+parts[2], bulan[parts[1]] ?? 0, +parts[0]);
    }
    // fallback: coba parse langsung
    const d = new Date(str);
    return isNaN(d) ? new Date(0) : d;
  }

  // ──────────────────────────────────────────
  //  Render list
  // ──────────────────────────────────────────
  let allItems = [];

  function render(items) {
    const list = document.getElementById('news-list');
    document.getElementById('count-badge').textContent = items.length;

    if (items.length === 0) {
      list.innerHTML = `
        <div class="state-box">
          <div class="icon">🔍</div>
          <strong>Tidak ditemukan</strong>
          <p>Coba kata kunci yang berbeda.</p>
        </div>`;
      return;
    }

    list.innerHTML = items.map((item, i) => `
      <a class="news-card" href="${item.filename}">
        <span class="num">${String(i+1).padStart(2,'0')}</span>
        <div class="info">
          <div class="judul">${escHtml(item.judul)}</div>
          <div class="meta">
            <span class="meta-item"><span class="meta-icon">✍</span>${escHtml(item.author)}</span>
            <span class="meta-item"><span class="meta-icon">📅</span>${escHtml(item.tanggal)}</span>
            <span class="meta-item"><span class="meta-icon">📄</span>${item.filename}</span>
          </div>
        </div>
        <span class="arrow">›</span>
      </a>
    `).join('');
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ──────────────────────────────────────────
  //  Filter + Sort
  // ──────────────────────────────────────────
  function applyFilters() {
    const q    = document.getElementById('search-input').value.toLowerCase().trim();
    const sort = document.getElementById('sort-select').value;

    let filtered = allItems.filter(item =>
      item.judul.toLowerCase().includes(q) ||
      item.author.toLowerCase().includes(q)
    );

    filtered.sort((a, b) => {
      if (sort === 'terbaru') return parseDate(b.tanggal) - parseDate(a.tanggal);
      if (sort === 'terlama') return parseDate(a.tanggal) - parseDate(b.tanggal);
      if (sort === 'az')      return a.judul.localeCompare(b.judul, 'id');
      if (sort === 'za')      return b.judul.localeCompare(a.judul, 'id');
      return 0;
    });

    render(filtered);
  }

  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('sort-select').addEventListener('change', applyFilters);

  // ──────────────────────────────────────────
  //  Main: baca file-list.json → fetch semua
  // ──────────────────────────────────────────
  (async () => {
    const list = document.getElementById('news-list');

    try {
      const res = await fetch('file-list.json');
      if (!res.ok) throw new Error('file-list.json tidak ditemukan');
      const files = await res.json();

      if (!Array.isArray(files) || files.length === 0) {
        list.innerHTML = `
          <div class="state-box">
            <div class="icon">📭</div>
            <strong>Belum ada berita</strong>
            <p>Tambahkan file .html berita ke folder ini, lalu jalankan <code>generate_list.py</code>.</p>
          </div>`;
        document.getElementById('count-badge').textContent = '0';
        return;
      }

      // Fetch meta semua file secara paralel
      const results = await Promise.all(files.map(f => fetchMeta(f)));
      allItems = results.filter(Boolean);

      applyFilters();

    } catch (err) {
      list.innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <strong>file-list.json tidak ditemukan</strong>
          <p>Jalankan <strong>generate_list.py</strong> di folder ini untuk men-generate daftar berita.</p>
          <p style="margin-top:8px;font-size:11px;color:#94A3B8">${err.message}</p>
        </div>`;
    }
  })();
</script>

</body>
</html>
